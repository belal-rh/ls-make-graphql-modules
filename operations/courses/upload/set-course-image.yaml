id: LS-COURSE-007
name: Kursbild hochladen
object: Course
action: upload
status: observed

operation:
  name: SetCourseImage
  sha256Hash: f2cf01baef20d81055fba0c2a6164b9d74973b42fd0eb26f7161fa4bff3e36de

endpoint:
  method: POST
  path: /graphql

authentication:
  type: bearer
  token_request: ../../../docs/authentication.md

parameters:
  courseId:
    type: string
    required: true
    id_type: NodeID

request:
  operationName: SetCourseImage
  variables:
    courseId: "{{courseId}}"
  extensions:
    persistedQuery:
      version: 1
      sha256Hash: f2cf01baef20d81055fba0c2a6164b9d74973b42fd0eb26f7161fa4bff3e36de

response:
  success_path: data.setCourseImage
  cardinality: one
  type: UploadSpec
  outputs:
    id:
      path: data.setCourseImage.id
      type: string
    requestHeaders:
      path: data.setCourseImage.requestHeaders
      type: object
    uploadUrl:
      path: data.setCourseImage.uploadUrl
      type: string
      sensitive: true

upload:
  method: PUT
  url: "{{response.uploadUrl}}"
  headers: "{{response.requestHeaders}}"
  body_type: binary
  include_bearer_token: false

verification:
  operation: CourseInfoQuery

errors:
  graphQl_errors_path: errors
  persisted_query_not_found:
    action: Capture a new RAW request and update sha256Hash.

make_module:
  name: uploadCourseImage
  label: Kursbild hochladen
  type: action
  implementation_status: planned