id: LS-TOPIC-001
name: Modulstruktur abrufen
object: TopicTree
action: fetch
status: verified
last_verified_at: 2026-07-20

operation:
  name: TopicQuery
  sha256Hash: b44496383040234ea01b5031834480ab3aa50435f4aa2f5ef8fa6f63ee7d285c

endpoint:
  method: POST
  path: /graphql

authentication:
  type: bearer
  token_request: ../../../docs/authentication.md

parameters:
  topicId:
    type: string
    required: true
    id_type: NodeID
    description: Base64 node ID of the topic/module.
  courseSid:
    type: string
    required: true
    id_type: SID
    description: Short ID of the parent course.

request:
  operationName: TopicQuery
  variables:
    topicId: "{{topicId}}"
    courseSid: "{{courseSid}}"
  extensions:
    persistedQuery:
      version: 1
      sha256Hash: b44496383040234ea01b5031834480ab3aa50435f4aa2f5ef8fa6f63ee7d285c

response:
  success_path: data.topic
  cardinality: one
  outputs:
    topicId:
      path: data.topic.id
      type: NodeID
    sections:
      path: data.topic.sections
      type: array
    sectionId:
      path: data.topic.sections[].id
      type: NodeID
    sectionName:
      path: data.topic.sections[].name
      type: string
    sectionDescription:
      path: data.topic.sections[].description
      type: string
    lessons:
      path: data.topic.sections[].lessons
      type: array
    lessonId:
      path: data.topic.sections[].lessons[].id
      type: NodeID
    lessonName:
      path: data.topic.sections[].lessons[].name
      type: string
    lessonIsPublished:
      path: data.topic.sections[].lessons[].isPublished
      type: boolean

errors:
  graphQl_errors_path: errors
  persisted_query_not_found:
    action: Capture a new RAW request and update sha256Hash.

make_module:
  name: getTopicTree
  label: Modulstruktur abrufen
  type: action
